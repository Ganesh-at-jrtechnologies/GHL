<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anugraha Valve Castings Case Study | GHL Enterprise</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .case-hero {
            position: relative;
            padding: 15rem 0 8rem;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }
        .case-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--navy), var(--bg-dark));
            opacity: 0.5;
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="grid-bg"></div>

    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i> GHL<span>Enterprise</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Platform</a></li>
                <li><a href="case-studies.html" class="active">Case Studies</a></li>
            </ul>
        </div>
    </header>

    <section class="case-hero">
        <div class="container reveal active">
            <span style="color: var(--electric-cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Steel</span>
            <h1 style="margin: 1rem 0 2rem;">Anugraha Valve Castings</h1>
            <p style="max-width: 800px; margin: 0 auto;">S4 Public Cloud Support</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="glass-card reveal">
                <h2 style="color: var(--white); margin-bottom: 1.5rem;">The Challenge</h2>
                <p style="margin-bottom: 3rem;">24x7 P1 ticket management for S4 HANA 2502 Public Cloud and AWS landscapes.</p>
                
                <h2 style="color: var(--white); margin-bottom: 1.5rem;">The Impact</h2>
                <p>Resulted in a 70% overall ticket reduction and seamless operations across global plants.</p>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
